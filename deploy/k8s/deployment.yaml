apiVersion: apps/v1
kind: Deployment
metadata: { name: fraud-detection-pipeline }
spec:
  replicas: 2
  selector: { matchLabels: { app: fraud-detection-pipeline } }
  template:
    metadata: { labels: { app: fraud-detection-pipeline } }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: api
          image: ghcr.io/replace-me/fraud-detection-pipeline:2.0.0
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: fraud-pipeline-config }
            - secretRef: { name: fraud-pipeline-secrets }
          readinessProbe:
            {
              httpGet: { path: /actuator/health/readiness, port: 8081 },
              initialDelaySeconds: 20,
              periodSeconds: 10,
            }
          livenessProbe:
            {
              httpGet: { path: /actuator/health/liveness, port: 8081 },
              initialDelaySeconds: 30,
              periodSeconds: 20,
            }
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits: { cpu: "1", memory: 768Mi }
---
apiVersion: v1
kind: Service
metadata: { name: fraud-detection-pipeline }
spec:
  selector: { app: fraud-detection-pipeline }
  ports: [{ port: 80, targetPort: 8081 }]
