name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify backend
        run: ./mvnw -B -ntp verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  docker-image:
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t ${{ github.event.repository.name }}:${{ github.sha }} .

  e2e:
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start full Docker Compose stack
        run: docker compose --profile app up --build -d

      - name: Wait for API readiness
        shell: bash
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent http://localhost:8081/actuator/health |
              grep -q '"status":"UP"'; then
              echo "Fraud Detection API is healthy."
              exit 0
            fi

            echo "Waiting for API readiness... attempt ${attempt}/60"
            sleep 5
          done

          echo "API did not become healthy within five minutes."
          docker compose ps
          docker compose logs --no-color
          exit 1

      - name: Run RestAssured E2E tests
        run: >
          ./mvnw -B -ntp
          -Dtest=FraudPipelineE2ETest
          -De2e.enabled=true
          -De2e.base-url=http://localhost:8081
          -De2e.admin-api-key=local-admin-key
          test

      - name: Capture Docker diagnostics
        if: failure()
        run: |
          docker compose ps > docker-compose-ps.txt
          docker compose logs --no-color > docker-compose.log

      - name: Upload Docker diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            docker-compose-ps.txt
            docker-compose.log
          if-no-files-found: warn

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose --profile app down -v --remove-orphans
