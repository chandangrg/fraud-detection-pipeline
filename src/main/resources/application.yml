spring:
  application.name: fraud-detection-pipeline
  profiles.active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
  flyway.enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties: { enable.idempotence: true }
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.chandan.frauddetection.dto"
        spring.json.value.default.type: "com.chandan.frauddetection.dto.TransactionEvent"
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 800ms
app:
  admin.api-key: ${ADMIN_API_KEY:change-me}
  demo-data.enabled: false
  scheduling.enabled: ${SCHEDULING_ENABLED:true}
  kafka.topic:
    transaction-events: ${TRANSACTION_EVENTS_TOPIC:transaction-events.v1}
    transaction-events-dlq: ${TRANSACTION_EVENTS_DLQ_TOPIC:transaction-events.v1-dlq}
  cache.account-ttl-seconds: 120
  outbox: { poll-delay-ms: 1000, batch-size: 50, lease-seconds: 30, send-timeout-ms: 5000 }
management:
  endpoints.web.exposure.include: health,info,metrics,prometheus
  endpoint.health.probes.enabled: true
logging.pattern.console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [correlationId=%X{correlationId}] %logger{36} - %msg%n"
---
spring:
  config.activate.on-profile: dev
  datasource:
    url: jdbc:h2:mem:frauddb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:

app.demo-data.enabled: true
---
spring:
  config.activate.on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/${DB_NAME:frauddb}
    username: ${DB_USER:frauduser}
    password: ${DB_PASSWORD}

app:
  admin.api-key: ${ADMIN_API_KEY}
  demo-data.enabled: ${DEMO_DATA_ENABLED:false}
